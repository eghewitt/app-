<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpNext — Ultra Premium Colorful Smart Assistant</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 35%, #831843 70%, #0f172a 100%);
            --card-bg: rgba(15, 23, 42, 0.75);
            --accent: #ec4899;
            --accent-glow: rgba(236, 72, 153, 0.4);
            /* Softer text colors for readability */
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #facc15;
            --neon-blue: #06b6d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            font-size: 1.2rem;
        }

        header {
            padding: 1.75rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(to right, #ff007f, #7000ff, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .streak-badge {
            background: linear-gradient(45deg, #ff5e36, #f13c73);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(241, 60, 115, 0.3);
        }

        .header-share-btn {
            background: linear-gradient(135deg, #06b6d4, #0ea5e9);
            color: white;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            transition: transform 0.2s;
        }
        .header-share-btn:hover { transform: scale(1.05); }

        .premium-btn {
            background: linear-gradient(45deg, #facc15, #ff8000);
            color: #0f172a;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(250, 204, 21, 0.4);
            transition: transform 0.2s;
        }
        .premium-btn:hover { transform: scale(1.05); }

        .container {
            max-width: 1600px;
            width: 95%;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .view-section {
            display: block; /* Kept active for presentation */
        }

        .welcome-hero {
            padding: 5rem 4rem;
            background: var(--card-bg);
            border-radius: 32px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            margin-bottom: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Hero Logo styling container */
        .hero-logo-container {
            margin-bottom: 1rem;
        }
        
        .hero-logo-img {
            max-width: 180px;
            height: auto;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .welcome-hero h1 {
            font-size: 4.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.04em;
            font-weight: 900;
            background: linear-gradient(to right, #ffffff, #f472b6, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-hero p {
            color: var(--text-muted);
            font-size: 1.4rem;
            max-width: 800px;
            line-height: 1.6;
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.75rem;
            border-radius: 30px;
            color: var(--text-muted);
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: inline-block;
            margin-bottom: 1rem;
        }

        /* Action Ending Section Styles */
        .ending-action-box {
            margin-top: 4rem;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .get-me-there-btn {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .get-me-there-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(236, 72, 153, 0.6);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">UpNext</div>
        <div class="header-controls">
            <div class="streak-badge">🔥 5 Day Streak</div>
            <button class="premium-btn">Go Premium</button>
            <button class="header-share-btn">✨ Share</button>
        </div>
    </header>

    <div class="container">
        <section class="view-section">
            <div class="welcome-hero">
                <div class="hero-logo-container">
                    <img src="logo.png" alt="UpNext Logo" class="hero-logo-img">
                </div>
                
                <span class="status-pill">System Status: Premium Active</span>
                <h1>Welcome to UpNext</h1>
                <p>Your beautiful, ultra-premium colorful smart assistant. Experience tailored intelligence wrapped in custom modern gradients.</p>
                
                <div class="ending-action-box">
                    <button class="get-me-there-btn">Get Me There 🚀</button>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
