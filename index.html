<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpNext — Your Personal Activity Assistant</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 50%, #2e1065 100%);
            --card-bg: rgba(30, 41, 59, 0.85);
            --accent: #6366f1;
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --success: #16a34a;
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            font-size: 1.2rem;
        }

        header {
            padding: 1.75rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1600px;
            width: 95%;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .view-section {
            display: none;
        }

        .view-section.active-view {
            display: block;
        }

        .welcome-hero {
            padding: 6rem 4rem;
            background: var(--card-bg);
            border-radius: 32px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .welcome-hero h1 {
            font-size: 4.2rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.04em;
            font-weight: 800;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 2.5rem;
        }

        .panel-box {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .panel-box h2 {
            font-size: 2.4rem;
            margin-bottom: 1.5rem;
        }

        .panel-box h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .step-group {
            display: none;
        }

        .step-group.active-step {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            margin: 3rem 0;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: bold;
        }

        select {
            padding: 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        select option {
            background: #1e1b4b;
            color: white;
        }

        select:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1.2rem 2.5rem;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:hover { opacity: 0.95; }
        .btn:active { transform: scale(0.98); }

        .btn-large {
            font-size: 1.8rem;
            padding: 1.5rem 5rem;
            border-radius: 50px;
            margin-top: 2rem;
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .btn-nav-group {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
        }

        .recs-deck {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 2.5rem;
        }

        .rec-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2.5rem;
            border: 2px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rec-card h3 {
            font-size: 2.2rem;
            margin: 0.5rem 0;
        }

        .rating-badge {
            background: rgba(250, 204, 21, 0.2);
            color: #facc15;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .card-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-maps {
            background: var(--success);
            text-decoration: none;
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-maps:hover { background-color: #15803d; }
        .btn-maps:active { transform: scale(0.98); }

        .btn-sec {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: none;
            padding: 1.2rem 1.8rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
