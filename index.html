<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpNext — Ultra Premium Colorful Smart Assistant</title>
    <style>
        :root {
            /* Default Theme: Social / Deep Hybrid */
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 35%, #831843 70%, #0f172a 100%);
            --card-bg: rgba(15, 23, 42, 0.65);
            --accent: #ec4899;
            --accent-glow: rgba(236, 72, 153, 0.4);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #facc15;
            --neon-blue: #06b6d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* --- Header Styles --- */
        header {
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(to right, #ff007f, #7000ff, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .streak-badge {
            background: linear-gradient(45deg, #ff5e36, #f13c73);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 4px 12px rgba(241, 60, 115, 0.3);
        }

        .header-share-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-share-btn:hover { 
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px); 
        }

        .nav-home-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- Layout Container --- */
        .container {
            max-width: 1200px;
            width: 90%;
            margin: 2rem auto;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Global Card Framework --- */
        .glass-panel {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            margin-bottom: 2rem;
        }

        h1, h2, h3 {
            background: linear-gradient(to right, #ffffff, #f472b6, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* --- HOME PAGE REDESIGN --- */
        .home-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .welcome-hero-card {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .welcome-hero-card h1 { font-size: clamp(2rem, 4vw, 3.2rem); }
        .welcome-hero-card p { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; }

        .status-pill {
            background: rgba(16, 185, 129, 0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            color: var(--success);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: inline-block;
            align-self: flex-start;
        }

        .cta-container {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .primary-btn {
            background: linear-gradient(45deg, #ff007f, #7000ff);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(236, 72, 153, 0.6);
        }

        .pricing-nav-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 1rem 1.5rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pricing-nav-btn:hover { background: rgba(255,255,255,0.2); }

        /* Quick Search Bar styles */
        .search-container {
            margin-top: 0.5rem;
        }
        .assistant-input-box {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 0.5rem 0.5rem 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .assistant-input-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.25);
            background: rgba(255, 255, 255, 0.1);
        }
        .assistant-input-box input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex-grow: 1;
            font-size: 1.1rem;
        }
        .assistant-input-box input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .ask-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .ask-btn:hover { opacity: 0.9; }

        /* Dashboard Sidebar Tabs */
        .dashboard-tabs {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .tab-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1.25rem;
        }
        .tab-panel h3 { margin-bottom: 0.75rem; font-size: 1.1rem; color: #fff; }
        .item-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
